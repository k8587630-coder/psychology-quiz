<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyQuiz — Психологічні квізи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07071a;
      --bg2: #0e0e2a;
      --card: rgba(255,255,255,0.04);
      --card-b: rgba(255,255,255,0.08);
      --text: #f0f0ff;
      --text2: #8888b0;
      --purple: #7f5af0;
      --purple-l: #a78bfa;
      --green: #2cb67d;
      --pink: #ec4899;
      --orange: #f97316;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --yellow: #f59e0b;
      --glow: rgba(127,90,240,0.25);
      --success-bg: rgba(44,182,125,0.12);
      --error: #e16162;
      --error-bg: rgba(225,97,98,0.12);
      --warning: #f9bc60;
    }
    [data-theme="light"] {
      --bg: #f0eeff; --bg2: #e8e3ff; --card: rgba(255,255,255,0.7);
      --card-b: rgba(0,0,0,0.08); --text: #1e1b4b; --text2: #6b7280;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* ── Aurora background ── */
    .bg-aurora {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(110px);
      animation: drift 28s ease-in-out infinite;
    }
    .orb:nth-child(1) { width: 550px; height: 550px; background: radial-gradient(circle, #7f5af0 0%, transparent 70%); top: -180px; left: -180px; opacity: 0.35; }
    .orb:nth-child(2) { width: 420px; height: 420px; background: radial-gradient(circle, #06b6d4 0%, transparent 70%); bottom: -120px; right: -120px; opacity: 0.25; animation-delay: -9s; }
    .orb:nth-child(3) { width: 360px; height: 360px; background: radial-gradient(circle, #ec4899 0%, transparent 70%); top: 40%; left: 35%; opacity: 0.18; animation-delay: -18s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(70px,-90px) scale(1.06); }
      66% { transform: translate(-50px,70px) scale(0.96); }
    }

    /* ── Layout ── */
    .app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; }

    /* ── Topbar ── */
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 24px; }
    .logo {
      font-size: 1.5rem; font-weight: 900; cursor: pointer; letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .topbar-right { display: flex; gap: 8px; }
    .icon-btn {
      width: 44px; height: 44px; border-radius: 14px;
      border: 1px solid var(--card-b); background: var(--card);
      backdrop-filter: blur(12px); color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem; transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--purple-l); color: var(--text); transform: translateY(-1px); }

    /* ── Screens ── */
    .screen { display: none; animation: fadeUp 0.4s ease; }
    .screen.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Hero ── */
    .hero { padding: 8px 0 24px; }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(127,90,240,0.14); border: 1px solid rgba(127,90,240,0.3);
      border-radius: 100px; padding: 5px 14px;
      font-size: 0.72rem; font-weight: 700; color: var(--purple-l);
      margin-bottom: 14px; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .hero h1 {
      font-size: clamp(1.9rem, 5vw, 2.8rem); font-weight: 900;
      line-height: 1.1; letter-spacing: -0.04em; margin-bottom: 10px;
    }
    .hero h1 .grad {
      background: linear-gradient(135deg, var(--purple-l), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--text2); font-size: 1rem; max-width: 460px; line-height: 1.65; }

    /* ── Stats ── */
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0 26px; }
    .stat-card {
      background: var(--card); backdrop-filter: blur(12px);
      border: 1px solid var(--card-b); border-radius: 18px; padding: 14px; text-align: center;
    }
    .stat-value { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, var(--purple), var(--purple-l)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { font-size: 0.62rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px; font-weight: 600; }

    /* ── Section title ── */
    .section-title {
      font-size: 0.72rem; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 0 0 14px; display: flex; align-items: center; gap: 10px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--card-b); }

    /* ── Bento quiz grid ── */
    .quiz-bento { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .quiz-bento .qcard-full { grid-column: 1 / -1; }

    /* ── Quiz card ── */
    .quiz-card {
      background: var(--card); backdrop-filter: blur(16px);
      border: 1px solid var(--card-b); border-radius: 22px; padding: 24px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .quiz-card:hover { transform: translateY(-5px) scale(1.01); }
    .quiz-card::after {
      content: ''; position: absolute; inset: 0; border-radius: 22px;
      opacity: 0; transition: opacity 0.35s;
      background: radial-gradient(circle at 80% 20%, var(--glow-c, rgba(127,90,240,0.25)) 0%, transparent 65%);
    }
    .quiz-card:hover::after { opacity: 1; }
    .quiz-card[data-topic="cognitive"]  { --glow-c: rgba(127,90,240,0.3); }
    .quiz-card[data-topic="emotions"]   { --glow-c: rgba(236,72,153,0.3); }
    .quiz-card[data-topic="personality"]{ --glow-c: rgba(249,115,22,0.3); }
    .quiz-card[data-topic="social"]     { --glow-c: rgba(59,130,246,0.3); }
    .quiz-card[data-topic="development"]{ --glow-c: rgba(34,197,94,0.3); }
    .quiz-card[data-topic="neuro"]      { --glow-c: rgba(6,182,212,0.3); }
    .quiz-card:hover { box-shadow: 0 16px 40px -8px var(--glow-c, var(--glow)); border-color: rgba(255,255,255,0.14); }

    .card-icon { font-size: 2.2rem; margin-bottom: 12px; display: block; }
    .quiz-card h3 { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .card-meta { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .card-tag {
      font-size: 0.67rem; font-weight: 600;
      background: rgba(255,255,255,0.07); border-radius: 8px; padding: 3px 9px;
      color: var(--text2); border: 1px solid var(--card-b);
    }
    .card-tag.c { background: rgba(127,90,240,0.12); color: var(--purple-l); border-color: rgba(127,90,240,0.2); }

    /* ── Icebreaker ── */
    .icebreaker-section {
      background: var(--card); backdrop-filter: blur(20px);
      border: 1px solid var(--card-b); border-radius: 24px;
      padding: 28px; margin: 0 0 28px; position: relative; overflow: hidden;
    }
    .icebreaker-section::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(135deg, rgba(127,90,240,0.06), rgba(6,182,212,0.04));
    }
    .icebreaker-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; }
    .icebreaker-sub { font-size: 0.84rem; color: var(--text2); margin-bottom: 22px; }
    .icebreaker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .animal-card { cursor: pointer; text-align: center; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .animal-img-wrapper {
      width: 100%; aspect-ratio: 1; border-radius: 50%; overflow: hidden;
      border: 2.5px solid var(--card-b); box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      transition: all 0.3s;
    }
    .animal-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .animal-card:hover { transform: scale(1.08) translateY(-4px); }
    .animal-card.selected .animal-img-wrapper { border-color: var(--green); box-shadow: 0 0 0 4px rgba(44,182,125,0.25), 0 4px 20px rgba(0,0,0,0.3); }
    .animal-mood { font-size: 0.72rem; color: var(--text2); margin-top: 8px; font-weight: 500; }
    .animal-card.selected .animal-mood { color: var(--green); font-weight: 700; }
    .ice-feedback {
      margin-top: 16px; padding: 14px 18px; display: none;
      background: var(--success-bg); border: 1px solid rgba(44,182,125,0.2);
      border-radius: 14px; color: var(--green); font-size: 0.9rem;
    }

    /* ── Lesson hero ── */
    .lesson-hero { position: relative; height: 250px; border-radius: 24px; overflow: hidden; margin-bottom: 28px; }
    .lesson-hero img { width: 100%; height: 100%; object-fit: cover; }
    .lesson-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(0deg, rgba(7,7,26,0.92) 0%, rgba(7,7,26,0.3) 55%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 28px;
    }
    .lesson-hero-pill {
      display: inline-flex; align-items: center;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 100px;
      padding: 5px 12px; font-size: 0.7rem; font-weight: 700; margin-bottom: 8px; width: fit-content;
    }
    .lesson-hero-title { font-size: 1.75rem; font-weight: 900; color: #fff; letter-spacing: -0.03em; }

    /* ── Lesson content ── */
    .lesson-rich-content { line-height: 1.8; font-size: 1rem; color: var(--text2); }
    .lesson-rich-content h3 {
      font-size: 1.15rem; font-weight: 800; color: var(--text);
      margin: 38px 0 12px; letter-spacing: -0.02em;
    }
    .lesson-rich-content h3 .num {
      display: inline-flex; width: 28px; height: 28px; border-radius: 8px;
      background: rgba(127,90,240,0.2); color: var(--purple-l);
      align-items: center; justify-content: center; font-size: 0.85rem; margin-right: 8px;
    }
    .lesson-rich-content p { margin-bottom: 16px; }
    .lesson-rich-content b { color: var(--text); font-weight: 700; }
    .illustration-box { margin: 24px 0; border-radius: 18px; overflow: hidden; border: 1px solid var(--card-b); }
    .illustration-box img { width: 100%; display: block; }
    .lesson-quote {
      border-left: 3px solid var(--purple); padding: 14px 22px; margin: 24px 0;
      background: rgba(127,90,240,0.07); border-radius: 0 16px 16px 0;
      font-style: italic; color: var(--text); line-height: 1.65; font-size: 0.95rem;
    }
    .fact-box {
      background: rgba(6,182,212,0.07); border: 1px solid rgba(6,182,212,0.18);
      border-radius: 16px; padding: 16px 20px; margin: 20px 0;
    }
    .fact-label { font-size: 0.68rem; font-weight: 700; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }

    /* ── Accordion ── */
    .lesson-item {
      background: var(--card); backdrop-filter: blur(10px);
      border: 1px solid var(--card-b); border-radius: 16px;
      margin-bottom: 8px; overflow: hidden;
    }
    .lesson-header { padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .lesson-header h4 { font-size: 0.9rem; font-weight: 600; line-height: 1.4; flex: 1; }
    .lesson-header .chev { color: var(--text2); font-size: 0.75rem; transition: transform 0.3s; flex-shrink: 0; }
    .lesson-item.active .chev { transform: rotate(180deg); }
    .lesson-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .lesson-item.active .lesson-content { max-height: 500px; }
    .lesson-body { padding: 0 20px 16px; font-size: 0.88rem; color: var(--text2); line-height: 1.65; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 16px; border-radius: 16px; border: none;
      background: linear-gradient(135deg, var(--purple) 0%, #5e35c8 100%);
      color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer;
      transition: all 0.25s; letter-spacing: -0.01em;
      box-shadow: 0 4px 24px rgba(127,90,240,0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(127,90,240,0.5); }
    .btn-secondary {
      width: 100%; padding: 14px; border-radius: 14px;
      background: var(--card); backdrop-filter: blur(10px);
      color: var(--text); border: 1px solid var(--card-b);
      cursor: pointer; font-size: 0.9rem; transition: all 0.2s; font-weight: 500;
    }
    .btn-secondary:hover { border-color: var(--purple-l); }

    /* ── Quiz screen ── */
    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .quiz-prog-bar { height: 4px; background: var(--card-b); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
    .quiz-prog-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--cyan)); border-radius: 2px; transition: width 0.5s ease; }
    .question-card {
      background: var(--card); backdrop-filter: blur(16px);
      border: 1px solid var(--card-b); border-radius: 24px; padding: 28px;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      width: 100%; text-align: left; padding: 15px 18px;
      border: 1.5px solid var(--card-b); border-radius: 14px;
      background: rgba(255,255,255,0.03); color: var(--text);
      cursor: pointer; transition: all 0.2s; font-size: 0.95rem; font-weight: 500;
    }
    .opt-btn:hover:not(:disabled) { border-color: var(--purple-l); background: rgba(127,90,240,0.08); transform: translateX(4px); }
    .opt-btn.correct { border-color: var(--green); background: var(--success-bg); color: #2cb67d; }
    .opt-btn.wrong { border-color: var(--error); background: var(--error-bg); }
    .q-feedback { margin-top: 20px; padding: 16px; border-radius: 14px; display: none; background: var(--bg2); border: 1px solid var(--card-b); }

    /* ── Results ── */
    .results-card { text-align: center; padding: 50px 24px; background: var(--card); backdrop-filter: blur(16px); border: 1px solid var(--card-b); border-radius: 28px; }
    .score-big { font-size: 5rem; font-weight: 900; letter-spacing: -0.05em; background: linear-gradient(135deg, var(--purple), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 16px; }

    /* ── Lessons grid ── */
    .lesson-module-card {
      background: var(--card); backdrop-filter: blur(16px);
      border: 1px solid var(--card-b); border-radius: 22px;
      padding: 24px 18px; cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .lesson-module-card:hover { transform: translateY(-5px); border-color: rgba(127,90,240,0.35); box-shadow: 0 14px 34px rgba(127,90,240,0.2); }
    .lesson-module-card .icon { font-size: 2.4rem; }
    .lesson-module-card h4 { font-size: 0.9rem; font-weight: 700; line-height: 1.3; }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .icebreaker-grid { grid-template-columns: repeat(2, 1fr); }
      .lesson-hero { height: 185px; }
      .quiz-bento { grid-template-columns: 1fr; }
      #lessonsModulesGrid { grid-template-columns: 1fr 1fr !important; }
    }
  </style>
</head>
<body>
<div class="bg-aurora"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="app">
  <div class="topbar">
    <div class="logo" onclick="showScreen('home')">PsyQuiz ✦</div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="showScreen('home')">🏠</button>
      <button class="icon-btn" onclick="showScreen('lessons')">📚</button>
      <button class="icon-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="hero">
      <div class="hero-pill">✦ Психологія · 2026</div>
      <h1>Відкрий таємниці<br><span class="grad">власного розуму</span></h1>
      <p>Квізи, уроки і факти — все що треба знати про психологію.</p>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="totalPlayed">0</div><div class="stat-label">Ігор</div></div>
      <div class="stat-card"><div class="stat-value" id="avgScore">0%</div><div class="stat-label">Бал</div></div>
      <div class="stat-card"><div class="stat-value" id="totalXP">0</div><div class="stat-label">XP</div></div>
      <div class="stat-card"><div class="stat-value">🎓</div><div class="stat-label">Статус</div></div>
    </div>
    <div class="section-title">Оберіть квіз</div>
    <div class="quiz-bento" id="quizGrid"></div>
  </div>

  <!-- LESSONS -->
  <div class="screen" id="screen-lessons">
    <div class="hero" style="padding-bottom: 8px;">
      <h1 style="font-size: 2rem;">📚 Бібліотека знань</h1>
      <p>Оберіть тему для глибокого вивчення</p>
    </div>
    <div id="lessonsModulesGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;"></div>
    <button class="btn-secondary" style="margin-top: 28px;" onclick="showScreen('home')">← Назад</button>
  </div>

  <!-- LESSON DETAIL -->
  <div class="screen" id="screen-lesson-detail">
    <div id="lessonDetailContent"></div>
    <button class="btn-secondary" style="margin-top: 20px; margin-bottom: 40px;" onclick="showScreen('lessons')">← До бібліотеки</button>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-header">
      <h3 id="playTitle" style="font-weight: 800; letter-spacing: -0.02em;">Квіз</h3>
      <div id="timer" style="font-weight: 900; font-size: 1.2rem; color: var(--purple-l);">30с</div>
    </div>
    <div class="quiz-prog-bar"><div class="quiz-prog-fill" id="progFill" style="width: 0%"></div></div>
    <div class="question-card">
      <div id="qText" style="font-size: 1.15rem; font-weight: 700; margin-bottom: 20px; line-height: 1.4; letter-spacing: -0.02em;"></div>
      <div id="qOptions" class="options"></div>
      <div id="qFeedback" class="q-feedback">
        <h4 id="fbHeader" style="margin-bottom: 6px;"></h4>
        <p id="fbText" style="font-size: 0.9rem; color: var(--text2);"></p>
      </div>
      <button id="qNext" class="btn-primary" style="margin-top: 20px; display: none;" onclick="nextQ()">Далі →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div class="results-card">
      <div class="score-big" id="scoreText">0%</div>
      <p id="resMessage" style="margin: 0 0 28px; font-size: 1.05rem; color: var(--text2);"></p>
      <div id="resBadge" style="font-size: 3rem; margin-bottom: 24px;"></div>
      <button class="btn-primary" onclick="showScreen('home')">🏠 На головну</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const quizzes = [
  {
    id: 'cognitive', title: 'Як працює розум?', icon: '🧠',
    color: '#7f5af0', desc: 'Пам\'ять, увага, мислення',
    questions: [
      { q: "Що таке ефект Даннінга-Крюгера?", opts: ["Люди з низьким рівнем знань переоцінюють себе","Люди краще пам'ятають незавершене","Підкорення авторитету","Вплив спостереження"], ans: 0, info: "Некомпетентні люди часто не мають достатньо знань, щоб оцінити власну некомпетентність." },

// ─── STATE & LOGIC ────────────────────────────────────────────────────────────

let state = { quiz: null, qIdx: 0, score: 0, timer: null, timeLeft: 30 };

function getStorage() {
  try { return JSON.parse(localStorage.getItem('psyquiz') || '{}'); } catch(e) { return {}; }
}
function saveStorage(d) { localStorage.setItem('psyquiz', JSON.stringify(d)); }

function showScreen(name) {
  clearInterval(state.timer);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('screen-' + name);
  if (el) el.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'lessons') renderLessons();
  window.scrollTo(0, 0);
}

function renderHome() {
  const data = getStorage();
  const results = data.results || [];
  document.getElementById('totalPlayed').textContent = results.length;
  const total = results.reduce((s, r) => s + r.pct, 0);
  document.getElementById('avgScore').textContent = (results.length ? Math.round(total / results.length) : 0) + '%';
  document.getElementById('totalXP').textContent = data.xp || 0;

  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  quizzes.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card' + (i === 0 ? ' qcard-full' : '');
    card.setAttribute('data-topic', q.id);
    card.onclick = () => startQuiz(q.id);
    const qCount = q.questions.length;
    card.innerHTML = `
      <span class="card-icon">${q.icon}</span>
      <h3>${q.title}</h3>
      <p style="font-size:0.84rem;color:var(--text2);line-height:1.5;">${q.desc}</p>
      <div class="card-meta">
        <span class="card-tag">${qCount} питань</span>
        <span class="card-tag c">Квіз</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderLessons() {
  const grid = document.getElementById('lessonsModulesGrid');
  grid.innerHTML = '';
  quizzes.forEach(q => {
    const card = document.createElement('div');
    card.className = 'lesson-module-card';
    card.onclick = () => viewLesson(q.id);
    card.innerHTML = `<span class="icon">${q.icon}</span><h4>${q.title}</h4><p style="font-size:0.78rem;color:var(--text2);">${q.desc}</p>`;
    grid.appendChild(card);
  });
}

function viewLesson(id) {
  const lesson = lessonMaterials[id];
  const quiz = quizzes.find(q => q.id === id);
  if (!lesson || !quiz) return;

  const pool = icebreakerPool[id] || icebreakerPool['emotions'];
  const iceHTML = `
    <div class="icebreaker-section">
      <div class="icebreaker-title">🐾 Криголам — Який ти сьогодні?</div>
      <div class="icebreaker-sub">Оберіть тварину, яка найкраще передає твій настрій зараз</div>
      <div class="icebreaker-grid">
        ${pool.map((a, i) => `
          <div class="animal-card" onclick="selectIce(this, '${a.mood}')">
            <div class="animal-img-wrapper"><img src="${a.img}" alt="${a.mood}" loading="lazy"></div>
            <div class="animal-mood">${a.mood}</div>
          </div>
        `).join('')}
      </div>
      <div id="iceFB" class="ice-feedback"></div>
    </div>
  `;

  document.getElementById('lessonDetailContent').innerHTML = `
    <div class="lesson-hero">
      <img src="${lesson.hero}" alt="${quiz.title}">
      <div class="lesson-hero-overlay">
        <span class="lesson-hero-pill">${quiz.icon} ${quiz.desc}</span>
        <div class="lesson-hero-title">${quiz.title}</div>
      </div>
    </div>
    ${iceHTML}
    <div class="lesson-rich-content">
      <p style="font-size:1.1rem;color:var(--purple-l);font-weight:700;margin-bottom:8px;">${lesson.intro}</p>
      ${lesson.content}
    </div>
    <div class="section-title" style="margin-top:40px;">Питання для закріплення</div>
    <div id="lAcc"></div>
    <button class="btn-primary" style="margin-top:28px;" onclick="startQuiz('${id}')">✍️ Почати квіз за темою</button>
  `;

  const acc = document.getElementById('lAcc');
  quiz.questions.forEach(q => {
    const item = document.createElement('div');
    item.className = 'lesson-item';
    item.innerHTML = `
      <div class="lesson-header" onclick="this.parentElement.classList.toggle('active')">
        <h4>${q.q}</h4><span class="chev">▾</span>
      </div>
      <div class="lesson-content">
        <div class="lesson-body"><b>Відповідь:</b> ${q.opts[q.ans]}<br><br>${q.info}</div>
      </div>
    `;
    acc.appendChild(item);
  });
  showScreen('lesson-detail');
}

function selectIce(el, mood) {
  document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const fb = document.getElementById('iceFB');
  fb.style.display = 'block';
  fb.innerHTML = `✨ Чудово! Ти сьогодні — <b>${mood}</b>. Відмінний настрій для навчання!`;
}

function startQuiz(id) {
  const q = quizzes.find(x => x.id === id);
  if (!q || !q.questions.length) { alert('Квіз у розробці!'); return; }
  state = { quiz: q, qIdx: 0, score: 0, timer: null, timeLeft: 30 };
  document.getElementById('playTitle').textContent = q.icon + ' ' + q.title;
  showScreen('quiz');
  showQ();
}

function showQ() {
  state.timeLeft = 30;
  const q = state.quiz.questions[state.qIdx];
  const total = state.quiz.questions.length;

  // Progress bar
  document.getElementById('progFill').style.width = (state.qIdx / total * 100) + '%';

  document.getElementById('qText').textContent = `${state.qIdx + 1}/${total}  ${q.q}`;
  const opts = document.getElementById('qOptions');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o;
    b.onclick = () => selAns(i);
    opts.appendChild(b);
  });
  document.getElementById('qFeedback').style.display = 'none';
  document.getElementById('qNext').style.display = 'none';
  document.getElementById('timer').textContent = '30с';

  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.timeLeft--;
    document.getElementById('timer').textContent = state.timeLeft + 'с';
    if (state.timeLeft <= 5) document.getElementById('timer').style.color = 'var(--error)';
    else document.getElementById('timer').style.color = 'var(--purple-l)';
    if (state.timeLeft <= 0) selAns(-1);
  }, 1000);
}

function selAns(idx) {
  clearInterval(state.timer);
  const q = state.quiz.questions[state.qIdx];
  const correct = idx === q.ans;
  if (correct) state.score++;

  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
    b.disabled = true;
  });

  const fb = document.getElementById('qFeedback');
  document.getElementById('fbHeader').textContent = correct ? '✅ Правильно!' : '❌ Не зовсім...';
  document.getElementById('fbText').textContent = q.info;
  fb.style.display = 'block';
  document.getElementById('qNext').style.display = 'block';
}

function nextQ() {
  state.qIdx++;
  if (state.qIdx < state.quiz.questions.length) {
    showQ();
  } else {
    finish();
  }
}

function finish() {
  const total = state.quiz.questions.length;
  const pct = Math.round(state.score / total * 100);
  const data = getStorage();
  if (!data.results) data.results = [];
  data.results.unshift({ quizId: state.quiz.id, pct, date: new Date().toISOString() });
  if (data.results.length > 50) data.results = data.results.slice(0, 50);
  data.xp = (data.xp || 0) + state.score * 10;
  saveStorage(data);

  document.getElementById('progFill').style.width = '100%';
  document.getElementById('scoreText').textContent = pct + '%';

  let badge = '🌱', msg = 'Продовжуй вчитись — ти обов\'язково покращиш результат!';
  if (pct >= 90) { badge = '🏆'; msg = 'Вражаюче! Ти справжній знавець психології!'; }
  else if (pct >= 70) { badge = '⭐'; msg = 'Чудовий результат! Ще трохи і ти стаєш експертом.'; }
  else if (pct >= 50) { badge = '💪'; msg = 'Непоганий старт! Прочитай урок і спробуй ще раз.'; }

  document.getElementById('resBadge').textContent = badge;
  document.getElementById('resMessage').textContent = msg;
  showScreen('results');
}

function toggleTheme() {
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next === 'dark' ? null : next);
  const d = getStorage(); d.theme = next; saveStorage(d);
}

// Init
const _d = getStorage();
if (_d.theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
renderHome();
</script>
