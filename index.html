<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyQuiz — Психологічні квізи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0e17;
      --bg-secondary: #1a1932;
      --bg-card: #232246;
      --bg-card-hover: #2d2b5e;
      --text-primary: #fffffe;
      --text-secondary: #a7a9be;
      --accent: #7f5af0;
      --accent-light: #a78bfa;
      --accent-glow: rgba(127, 90, 240, 0.3);
      --success: #2cb67d;
      --success-bg: rgba(44, 182, 125, 0.15);
      --error: #e16162;
      --error-bg: rgba(225, 97, 98, 0.15);
      --warning: #f9bc60;
      --border: rgba(255,255,255,0.08);
      --glass: rgba(35, 34, 70, 0.85);
    }

    [data-theme="light"] {
      --bg-primary: #f5f3ff;
      --bg-secondary: #ede9fe;
      --bg-card: #ffffff;
      --bg-card-hover: #f3f0ff;
      --text-primary: #1e1b4b;
      --text-secondary: #6b7280;
      --accent: #7c3aed;
      --accent-light: #8b5cf6;
      --accent-glow: rgba(124, 58, 237, 0.2);
      --border: rgba(0,0,0,0.08);
      --glass: rgba(255, 255, 255, 0.9);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }

    .bg-animation .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .orb:nth-child(1) { width: 400px; height: 400px; background: #7f5af0; top: -100px; left: -100px; }
    .orb:nth-child(2) { width: 350px; height: 350px; background: #2cb67d; bottom: -80px; right: -80px; animation-delay: -7s; }
    .orb:nth-child(3) { width: 300px; height: 300px; background: #e16162; top: 50%; left: 50%; animation-delay: -14s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(80px, -60px) scale(1.1); }
      50% { transform: translate(-40px, 80px) scale(0.95); }
      75% { transform: translate(60px, 40px) scale(1.05); }
    }

    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle {
      position: absolute; width: 3px; height: 3px; background: var(--accent-light); border-radius: 50%;
      opacity: 0; animation: sparkle 4s ease-in-out infinite;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: translateY(0); }
      50% { opacity: 0.6; transform: translateY(-30px); }
    }

    .app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; }

    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 20px; }
    .logo {
      font-size: 1.4rem; font-weight: 800; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .icon-btn {
      width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-secondary); display: flex;
      align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
    }
    .icon-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); transform: translateY(-1px); }

    .level-badge-mini {
      padding: 6px 14px; border-radius: 12px; font-size: 0.78rem; font-weight: 700;
      border: 1px solid var(--border); background: var(--bg-card); color: var(--accent);
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }

    .screen { display: none; animation: screenIn 0.5s ease; }
    .screen.active { display: block; }

    @keyframes screenIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero { text-align: center; padding: 30px 0 20px; }
    .hero-icon { font-size: 3.5rem; margin-bottom: 16px; display: inline-block; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
    .hero p { color: var(--text-secondary); font-size: 1rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }

    .fact-card {
      background: linear-gradient(135deg, var(--accent-glow), transparent);
      border: 1px solid var(--accent); border-radius: 20px; padding: 20px 24px; margin: 20px 0;
      position: relative; overflow: hidden;
    }
    .fact-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--accent-light); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
    }
    .fact-text { font-size: 0.95rem; line-height: 1.7; color: var(--text-primary); position: relative; }

    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 16px; text-align: center; transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.68rem; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; }

    .level-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
      padding: 20px 24px; margin: 20px 0; display: flex; align-items: center; gap: 18px; cursor: pointer;
    }
    .level-icon { font-size: 2.5rem; }
    .level-info { flex: 1; }
    .level-title { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .xp-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); transition: width 0.8s; }
    .xp-text { font-size: 0.72rem; color: var(--text-secondary); margin-top: 4px; text-align: right; }

    .section-title { font-size: 1.05rem; font-weight: 700; margin: 24px 0 14px; display: flex; align-items: center; gap: 8px; }

    .quiz-grid { display: grid; gap: 14px; }
    .quiz-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
      padding: 22px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .quiz-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 30px var(--accent-glow); }

    .lesson-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      margin-bottom: 10px; overflow: hidden; transition: all 0.3s ease;
    }
    .lesson-header {
      padding: 18px 22px; cursor: pointer; display: flex; justify-content: space-between;
      align-items: center; gap: 12px;
    }
    .lesson-header h4 { font-size: 0.95rem; font-weight: 600; flex: 1; }
    .lesson-icon-status { font-size: 1.2rem; transition: transform 0.3s; color: var(--accent); }
    .lesson-item.active .lesson-icon-status { transform: rotate(180deg); }
    .lesson-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: rgba(0,0,0,0.1); }
    .lesson-item.active .lesson-content { max-height: 1000px; }
    .lesson-body { padding: 20px 22px; font-size: 0.9rem; line-height: 1.7; color: var(--text-secondary); border-top: 1px solid var(--border); }

    .icebreaker-section {
      background: var(--bg-card); border-radius: 24px; padding: 30px;
      margin: 20px 0 30px; border: 1px solid var(--accent-glow); text-align: center;
    }
    .icebreaker-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; color: var(--text-primary); }
    .icebreaker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .animal-card { cursor: pointer; transition: all 0.3s; text-align: center; }
    .animal-img-wrapper {
      width: 100%; aspect-ratio: 1; border-radius: 50%; overflow: hidden;
      border: 3px solid transparent; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .animal-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .animal-card:hover { transform: scale(1.1); }
    .animal-card:hover .animal-img-wrapper { border-color: var(--accent-light); }
    .animal-card.selected .animal-img-wrapper { border-color: var(--success); box-shadow: 0 0 20px var(--success-bg); }
    .animal-number {
      display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px;
      border-radius: 50%; background: var(--bg-secondary); border: 1px solid var(--border);
      margin-top: 10px; font-size: 0.8rem; font-weight: 700; color: var(--text-secondary);
    }
    .animal-card.selected .animal-number { background: var(--success); color: #fff; border-color: var(--success); }
    .icebreaker-feedback {
      margin-top: 15px; padding: 12px; background: var(--success-bg); border-radius: 12px;
      font-size: 0.9rem; color: var(--success); display: none; animation: feedbackIn 0.4s ease;
    }

    .lesson-hero {
      position: relative; height: 250px; border-radius: 24px; overflow: hidden;
      margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .lesson-hero img { width: 100%; height: 100%; object-fit: cover; }
    .lesson-hero-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(0deg, rgba(15, 14, 23, 0.9) 0%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 30px;
    }
    .lesson-hero-title { font-size: 1.8rem; font-weight: 800; color: #fff; }

    .lesson-rich-content { line-height: 1.8; font-size: 1.05rem; color: var(--text-primary); }
    .lesson-rich-content h3 { font-size: 1.4rem; margin: 40px 0 15px; color: var(--accent-light); }
    .lesson-rich-content p { margin-bottom: 20px; color: var(--text-secondary); }
    .illustration-box { margin: 30px 0; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
    .illustration-box img { width: 100%; display: block; }
    .lesson-quote {
      border-left: 4px solid var(--accent); padding: 15px 25px; margin: 30px 0;
      background: var(--bg-card); border-radius: 0 16px 16px 0; font-style: italic;
    }
    .lesson-module-card {
      background: var(--bg-card); border-radius: 20px; padding: 20px; border: 1px solid var(--border);
      cursor: pointer; transition: all 0.3s; text-align: center;
    }
    .lesson-module-card:hover { transform: translateY(-5px); border-color: var(--accent); }
    .lesson-module-card .icon { font-size: 3rem; margin-bottom: 12px; display: block; }

    .quiz-play-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .timer { padding: 8px 14px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); font-weight: 600; }
    .progress-container { margin-bottom: 24px; }
    .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); width: 0%; transition: width 0.5s; }
    .question-card { background: var(--bg-card); border-radius: 24px; padding: 30px; }
    .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 24px; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      width: 100%; text-align: left; padding: 16px; border: 2px solid var(--border);
      border-radius: 16px; background: var(--bg-secondary); color: var(--text-primary);
      cursor: pointer; transition: 0.2s;
    }
    .opt-btn:hover { border-color: var(--accent); }
    .opt-btn.correct { background: var(--success-bg); border-color: var(--success); }
    .opt-btn.wrong { background: var(--error-bg); border-color: var(--error); }
    .feedback { margin-top: 20px; padding: 18px; border-radius: 16px; display: none; }
    .feedback.show { display: block; }
    .action-btn { margin-top: 20px; width: 100%; padding: 16px; border-radius: 16px; background: var(--accent); color: #fff; font-weight: 700; border: none; cursor: pointer; display: none; }
    .action-btn.show { display: block; }

    .results-card { background: var(--bg-card); border-radius: 24px; padding: 36px; text-align: center; }
    .score-circle { width: 130px; height: 130px; margin: 0 auto 20px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
    .score-circle svg { position: absolute; transform: rotate(-90deg); }
    .results-actions { display: flex; gap: 12px; margin-top: 20px; }
    .btn-primary, .btn-secondary { flex: 1; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg-secondary); border-radius: 14px; padding: 4px; }
    .tab-btn { flex: 1; padding: 10px; border-radius: 11px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; }
    .tab-btn.active { background: var(--bg-card); color: var(--text-primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .icebreaker-grid { grid-template-columns: repeat(2, 1fr); }
      .lesson-hero { height: 180px; }
    }
  </style>
</head>
<body>

<div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="particles" id="particles"></div>
<canvas id="confetti" style="position:fixed;top:0;left:0;pointer-events:none;z-index:100;"></canvas>

<div class="app">
  <div class="topbar">
    <div class="logo" onclick="showScreen('home')">PsyQuiz</div>
    <div class="topbar-actions">
      <div class="level-badge-mini" id="levelBadgeMini" onclick="showScreen('stats');switchTab('achievements')"></div>
      <button class="icon-btn" onclick="showScreen('stats')" title="Профіль">📈</button>
      <button class="icon-btn" onclick="showScreen('lessons')" title="Уроки">📚</button>
      <button class="icon-btn" onclick="toggleTheme()" title="Тема">🌓</button>
    </div>
  </div>

  <div class="screen active" id="screen-home">
    <div class="hero"><div class="hero-icon">🧠</div><h1>Психологічні квізи</h1><p>Вивчай себе та світ навколо.</p></div>
    <div id="factCard"></div>
    <div class="level-card" id="levelCard" onclick="showScreen('stats');switchTab('achievements')"></div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="totalPlayed">0</div><div class="stat-label">Квізів</div></div>
      <div class="stat-card"><div class="stat-value" id="avgScore">0%</div><div class="stat-label">Середній</div></div>
      <div class="stat-card"><div class="stat-value" id="bestStreak">0</div><div class="stat-label">Серія</div></div>
      <div class="stat-card"><div class="stat-value" id="totalXP">0</div><div class="stat-label">XP</div></div>
    </div>
    <div class="section-title">Твої квізи</div>
    <div class="quiz-grid" id="quizGrid"></div>
  </div>

  <div class="screen" id="screen-lessons">
    <div class="stats-header"><h2>Бібліотека знань</h2><p style="color:var(--text-secondary)">Обери модуль для вивчення</p></div>
    <div id="lessonsModulesGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px;"></div>
    <button class="btn-secondary" style="width:100%;" onclick="showScreen('home')">Назад</button>
  </div>

  <div class="screen" id="screen-lesson-detail">
    <div id="lessonDetailContent"></div>
    <button class="btn-secondary" style="width:100%;margin-top:20px;margin-bottom:40px;" onclick="showScreen('lessons')">До списку модулів</button>
  </div>

  <div class="screen" id="screen-quiz">
    <div class="quiz-play-header"><div id="playTitle">Квіз</div><div class="timer"><span id="timerValue">30</span>с</div></div>
    <div class="progress-container"><div class="progress-track"><div class="progress-fill" id="qProgressBar"></div></div></div>
    <div class="question-card">
      <div class="q-text" id="qText"></div>
      <div class="options" id="qOptions"></div>
      <div class="feedback" id="qFeedback"><h4 id="fbHeader"></h4><p id="fbText"></p></div>
      <button class="action-btn" id="qNext" onclick="nextQ()">Далі</button>
    </div>
  </div>

  <div class="screen" id="screen-results">
    <div class="results-card">
      <div class="score-circle"><svg width="130" height="130"><circle cx="65" cy="65" r="60" fill="none" stroke="var(--border)" stroke-width="8" /><circle id="resCircle" cx="65" cy="65" r="60" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round" /></svg><span id="scoreText">0%</span></div>
      <h2 id="resTitle">Готово!</h2>
      <p id="resMessage" style="margin:10px 0 20px;"></p>
      <div class="results-actions"><button class="btn-secondary" onclick="showScreen('home')">Меню</button><button class="btn-primary" id="retryBtn">Знову</button></div>
    </div>
  </div>

  <div class="screen" id="screen-stats">
    <div class="stats-header"><h2>Твій прогрес</h2></div>
    <div class="tabs"><button class="tab-btn active" onclick="switchTab('stats')">Статистика</button><button class="tab-btn" onclick="switchTab('achievements')">Досягнення</button></div>
    <div class="tab-content active" id="tab-stats"><div id="statsMain"></div><div class="section-title">Останні ігри</div><div id="historyList"></div></div>
    <div class="tab-content" id="tab-achievements"><div class="achievements-grid" id="achievementsGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"></div></div>
    <button class="btn-secondary" style="width:100%;margin-top:20px;" onclick="showScreen('home')">Назад</button>
  </div>
</div>

<script>
// =================== DATA ===================
const quizzes = [
  {
    id: 'cognitive', title: 'Як працює розум?', icon: '🧠',
    questions: [
      { q: "Що таке «ефект Даннінга-Крюгера»?", opts: ["Люди з низьким рівнем знань переоцінюють себе", "Люди краще пам'ятають незавершене", "Підкорення авторитету", "Вплив спостереження"], ans: 0, info: "Ефект, коли некомпетентні люди вважають себе експертами." },
      { q: "Яка частина мозку відповідає за страх?", opts: ["Гіпокамп", "Амігдала", "Префронтальна кора", "Мозочок"], ans: 1, info: "Амігдала миттєво обробляє загрози." },
      { q: "Скільки об'єктів утримує робоча пам'ять?", opts: ["3", "5", "7±2", "12"], ans: 2, info: "Магічне число Міллера каже про 5-9 елементів." },
      { q: "Що таке когнітивний дисонанс?", opts: ["Втрата пам'яті", "Дискомфорт від суперечливих думок", "Страх вибору", "Галюцинації"], ans: 1, info: "Конфлікт між діями та переконаннями." },
      { q: "Що таке ефект ореолу?", opts: ["Свічення навколо голови", "Одна риса впливає на загальне враження", "Забудькуватість", "Страх натовпу"], ans: 1, info: "Ми вважаємо привабливих людей розумнішими." },
      { q: "Зона найближчого розвитку — це?", opts: ["Місце в школі", "Те, що дитина може зробити з допомогою", "IQ", "Вік"], ans: 1, info: "Найкраще навчання відбувається тут." },
      { q: "Ефект праймінгу — це?", opts: ["Вплив першого враження", "Попередній стимул впливає на реакцію", "Втрата мотивації", "Лінь"], ans: 1, info: "Мозок реагує швидше на пов'язані речі." },
      { q: "Що таке підтверджувальне упередження?", opts: ["Довіра фактам", "Пошук того, що підтверджує твої думки", "Згода з усіма", "Сумніви"], ans: 1, info: "Ми ігноруємо те, що суперечить нашим поглядам." },
      { q: "Крива забування Еббінгауза показує?", opts: ["Ріст знань", "Швидку втрату інформації без повтору", "Вік", "IQ"], ans: 1, info: "Ми забуваємо 70% за добу без повторення." },
      { q: "Піраміда Маслоу — це про?", opts: ["Стадії розвитку", "Ієрархію потреб", "Горе", "Темперамент"], ans: 1, info: "Від базових потреб до саморозвитку." }
    ]
  },
  {

let state = { currentQuiz: null, currentQ: 0, score: 0, answered: false, timerInterval: null, timeLeft: 30, totalTime: 0 };

function getStorage() { try { return JSON.parse(localStorage.getItem('psyquiz') || '{}'); } catch { return {}; } }
function saveStorage(data) { localStorage.setItem('psyquiz', JSON.stringify(data)); }

function getLevel(xp) {
  const levels = [
    { name: 'Новачок', icon: '🌱', minXP: 0 }, { name: 'Учень', icon: '📖', minXP: 100 },
    { name: 'Дослідник', icon: '🔍', minXP: 300 }, { name: 'Знавець', icon: '🎓', minXP: 600 },
    { name: 'Експерт', icon: '⭐', minXP: 1000 }
  ];
  let lvl = levels[0]; for (const l of levels) { if (xp >= l.minXP) lvl = l; }
  const idx = levels.indexOf(lvl); const next = levels[idx + 1]; const progress = next ? ((xp - lvl.minXP) / (next.minXP - lvl.minXP)) * 100 : 100;
  return { ...lvl, index: idx + 1, progress, xp, nextXP: next ? next.minXP : lvl.minXP };
}

function showScreen(name) {
  clearInterval(state.timerInterval);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'stats') renderStats();
  if (name === 'lessons') renderLessons();
  window.scrollTo(0,0);
}

function renderHome() {
  const data = getStorage(); const xp = data.xp || 0; const results = data.results || []; const level = getLevel(xp);
  document.getElementById('totalPlayed').textContent = results.length;
  document.getElementById('avgScore').textContent = (results.length ? Math.round(results.reduce((s, r) => s + r.percentage, 0) / results.length) : 0) + '%';
  document.getElementById('totalXP').textContent = xp;
  document.getElementById('levelBadgeMini').textContent = `${level.icon} ${level.name}`;
  document.getElementById('levelCard').innerHTML = `<div class="level-icon">${level.icon}</div><div class="level-info"><div class="level-title">Рівень ${level.index}: ${level.name}</div><div class="xp-bar"><div class="xp-fill" style="width:${level.progress}%"></div></div><div class="xp-text">${xp} XP</div></div>`;
  const grid = document.getElementById('quizGrid'); grid.innerHTML = '';
  quizzes.forEach(q => {
    const card = document.createElement('div'); card.className = 'quiz-card'; card.onclick = () => startQuiz(q.id);
    card.innerHTML = `<h3>${q.icon} ${q.title}</h3><p style="font-size:0.8rem;color:var(--text-secondary);">Перевір знання</p>`;
    grid.appendChild(card);
  });
}

function renderLessons() {
  const grid = document.getElementById('lessonsModulesGrid'); grid.innerHTML = '';
  quizzes.forEach(q => {
    const card = document.createElement('div'); card.className = 'lesson-module-card'; card.onclick = () => viewLesson(q.id);
    card.innerHTML = `<span class="icon">${q.icon}</span><h4>${q.title}</h4>`;
    grid.appendChild(card);
  });
}

  const lesson = lessonMaterials[id]; const quiz = quizzes.find(q => q.id === id);

  const iceHTML = `<div class="icebreaker-section"><div class="icebreaker-title">Який я сьогодні? 🐾</div><div class="icebreaker-grid">${pool.map((a, i) => `<div class="animal-card" onclick="selectIce(this, '${a.mood}')"><div class="animal-img-wrapper"><img src="${a.img}"></div><span class="animal-number">${i+1}</span></div>`).join('')}</div><div id="iceFB" class="icebreaker-feedback"></div></div>`;
  document.getElementById('lessonDetailContent').innerHTML = `<div class="lesson-hero"><img src="${lesson.hero}"><div class="lesson-hero-overlay"><div class="lesson-hero-title">${quiz.title}</div></div></div>${iceHTML}<div class="lesson-rich-content"><p style="font-size:1.1rem;color:var(--accent-light);font-weight:700;">${lesson.intro}</p>${lesson.content}</div><div class="section-title">Перевірка</div><div id="lAcc"></div><button class="btn-primary" style="width:100%;margin-top:20px;" onclick="startQuiz('${id}')">Почати квіз ✍️</button>`;
  const acc = document.getElementById('lAcc');
  quiz.questions.forEach(q => {
    const item = document.createElement('div'); item.className = 'lesson-item';
    item.innerHTML = `<div class="lesson-header" onclick="this.parentElement.classList.toggle('active')"><h4>${q.q}</h4><span class="lesson-icon-status">▾</span></div><div class="lesson-content"><div class="lesson-body">${q.info}</div></div>`;
    acc.appendChild(item);
  });
  showScreen('lesson-detail');
}

function selectIce(el, mood) {
  document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected'); const fb = document.getElementById('iceFB');
  fb.style.display = 'block'; fb.innerHTML = `Чудово! Твій стан сьогодні — <b>${mood}</b>. Почнімо навчання!`;
}

function startQuiz(id) {
  const q = quizzes.find(x => x.id === id);
  state = { currentQuiz: q, currentQ: 0, score: 0, answered: false, timerInterval: null, timeLeft: 30 };
  document.getElementById('playTitle').textContent = q.title; showScreen('quiz'); showQ();
}

function showQ() {
  state.answered = false; state.timeLeft = 30; const q = state.currentQuiz.questions[state.currentQ];
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qProgressBar').style.width = ((state.currentQ + 1) / 10 * 100) + '%';
  const opts = document.getElementById('qOptions'); opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button'); b.className = 'opt-btn'; b.textContent = o; b.onclick = () => selAns(i); opts.appendChild(b);
  });
  document.getElementById('qFeedback').classList.remove('show'); document.getElementById('qNext').classList.remove('show');
  state.timerInterval = setInterval(() => { state.timeLeft--; document.getElementById('timerValue').textContent = state.timeLeft; if (state.timeLeft <= 0) selAns(-1); }, 1000);
}

function selAns(idx) {
  if (state.answered) return; state.answered = true; clearInterval(state.timerInterval);
  const q = state.currentQuiz.questions[state.currentQ]; const correct = idx === q.ans;
  if (correct) state.score++;
  document.querySelectorAll('.opt-btn').forEach((b, i) => { if (i === q.ans) b.classList.add('correct'); else if (i === idx) b.classList.add('wrong'); });
  document.getElementById('fbHeader').textContent = correct ? '✅ Правильно!' : '❌ Помилка';
  document.getElementById('fbText').textContent = q.info;
  document.getElementById('qFeedback').classList.add('show'); document.getElementById('qNext').classList.add('show');
}

function nextQ() { state.currentQ++; if (state.currentQ < 10) showQ(); else finish(); }

function finish() {
  const pct = Math.round((state.score / 10) * 100); const data = getStorage();
  if (!data.results) data.results = []; data.results.unshift({ quizId: state.currentQuiz.id, percentage: pct, date: new Date().toISOString() });
  data.xp = (data.xp || 0) + (state.score * 10); saveStorage(data);
  document.getElementById('scoreText').textContent = pct + '%'; document.getElementById('resCircle').style.strokeDashoffset = 377 - (377 * pct / 100);
  document.getElementById('resMessage').textContent = pct >= 80 ? 'Ти молодець! Справжній психолог.' : 'Гарна спроба, спробуй ще!';
  showScreen('results');
}

function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'light' ? '' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  const d = getStorage(); d.theme = t; saveStorage(d);
}

function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(t)));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id.includes(t)));
  if (t === 'achievements') renderAchievements();
}

function renderStats() {
  const data = getStorage(); const res = data.results || [];
  document.getElementById('statsMain').innerHTML = `<div class="stats-bar"><div class="stat-card"><div class="stat-value">${res.length}</div><div class="stat-label">Ігор</div></div><div class="stat-value">${data.xp || 0}</div><div class="stat-label">XP</div></div></div>`;
  const list = document.getElementById('historyList'); list.innerHTML = '';
  res.slice(0, 10).forEach(r => {
    const q = quizzes.find(x => x.id === r.quizId);
    list.innerHTML += `<div style="background:var(--bg-card);padding:12px;border-radius:12px;margin-bottom:8px;display:flex;justify-content:space-between;"><span>${q ? q.title : 'Квіз'}</span><b>${r.percentage}%</b></div>`;
  });
}

function renderAchievements() {
  const data = getStorage(); const grid = document.getElementById('achievementsGrid'); grid.innerHTML = '';
  const achs = [{ id: '1', name: 'Перша кров', icon: '🎯', min: 1 }, { id: '5', name: 'Ветеран', icon: '⚔️', min: 5 }, { id: '100', name: 'Майстер', icon: '💎', min: 10 }];
  achs.forEach(a => {
    const unlocked = (data.results || []).length >= a.min;
    grid.innerHTML += `<div class="stat-card" style="opacity:${unlocked ? 1 : 0.3}"><div style="font-size:2rem;">${a.icon}</div><b>${a.name}</b></div>`;
  });
}

// Init
if (getStorage().theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
renderHome();
</script>
</body>
