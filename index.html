<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyQuiz — Психологічні квізи</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0f0e17;
      --bg-secondary: #1a1932;
      --bg-card: #232246;
      --bg-card-hover: #2d2b5e;
      --text-primary: #fffffe;
      --text-secondary: #a7a9be;
      --accent: #7f5af0;
      --accent-light: #a78bfa;
      --accent-glow: rgba(127, 90, 240, 0.3);
      --success: #2cb67d;
      --success-bg: rgba(44, 182, 125, 0.15);
      --error: #e16162;
      --error-bg: rgba(225, 97, 98, 0.15);
      --warning: #f9bc60;
      --border: rgba(255,255,255,0.08);
      --glass: rgba(35, 34, 70, 0.85);
    }

    [data-theme="light"] {
      --bg-primary: #f5f3ff;
      --bg-secondary: #ede9fe;
      --bg-card: #ffffff;
      --bg-card-hover: #f3f0ff;
      --text-primary: #1e1b4b;
      --text-secondary: #6b7280;
      --accent: #7c3aed;
      --accent-light: #8b5cf6;
      --border: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .bg-animation .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }
    .orb:nth-child(1) { width: 400px; height: 400px; background: #7f5af0; top: -100px; left: -100px; }
    .orb:nth-child(2) { width: 350px; height: 350px; background: #2cb67d; bottom: -80px; right: -80px; }
    .orb:nth-child(3) { width: 300px; height: 300px; background: #e16162; top: 50%; left: 50%; }

    @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 25% { transform: translate(80px, -60px) scale(1.1); } 50% { transform: translate(-40px, 80px) scale(0.95); } 75% { transform: translate(60px, 40px) scale(1.05); } }

    .app { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 20px; min-height: 100vh; }

    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 20px; }
    .logo { font-size: 1.4rem; font-weight: 800; cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .icon-btn { width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 1.2rem; }
    .icon-btn:hover { background: var(--bg-card-hover); transform: translateY(-1px); }

    .screen { display: none; animation: screenIn 0.5s ease; }
    .screen.active { display: block; }
    @keyframes screenIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .hero { text-align: center; padding: 30px 0 20px; }
    .hero h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
    .hero p { color: var(--text-secondary); font-size: 1.1rem; max-width: 500px; margin: 0 auto; line-height: 1.6; }

    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.68rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 4px; }

    .quiz-grid { display: grid; gap: 14px; }
    .quiz-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 22px; cursor: pointer; transition: all 0.3s ease; }
    .quiz-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 30px var(--accent-glow); }

    .icebreaker-section { background: var(--bg-card); border-radius: 24px; padding: 30px; margin: 20px 0 30px; border: 1px solid var(--accent-glow); text-align: center; }
    .icebreaker-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
    .icebreaker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
    .animal-card { cursor: pointer; transition: all 0.3s; text-align: center; }
    .animal-img-wrapper { width: 100%; aspect-ratio: 1; border-radius: 50%; overflow: hidden; border: 3px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .animal-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .animal-card:hover { transform: scale(1.05); }
    .animal-card.selected .animal-img-wrapper { border-color: var(--success); box-shadow: 0 0 20px var(--success-bg); }
    .animal-number { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: var(--bg-secondary); margin-top: 10px; font-weight: 700; font-size: 0.8rem; }
    .animal-card.selected .animal-number { background: var(--success); color: #fff; }
    .icebreaker-feedback { margin-top: 15px; padding: 12px; background: var(--success-bg); border-radius: 12px; color: var(--success); display: none; }

    .lesson-hero { position: relative; height: 250px; border-radius: 24px; overflow: hidden; margin-bottom: 30px; }
    .lesson-hero img { width: 100%; height: 100%; object-fit: cover; }
    .lesson-hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(0deg, rgba(15, 14, 23, 0.9) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 30px; }
    .lesson-hero-title { font-size: 1.8rem; font-weight: 800; color: #fff; }
    .lesson-rich-content { line-height: 1.8; font-size: 1.05rem; color: var(--text-secondary); }
    .lesson-rich-content h3 { font-size: 1.4rem; margin: 40px 0 15px; color: var(--accent-light); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .lesson-rich-content p { margin-bottom: 20px; }
    .lesson-rich-content b { color: var(--text-primary); }
    .illustration-box { margin: 30px 0; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
    .illustration-box img { width: 100%; display: block; }
    .lesson-quote { border-left: 4px solid var(--accent); padding: 15px 25px; margin: 30px 0; background: var(--bg-card); border-radius: 0 16px 16px 0; font-style: italic; color: var(--text-primary); }
    
    .btn-primary { width: 100%; padding: 16px; border-radius: 16px; background: var(--accent); color: #fff; font-weight: 700; border: none; cursor: pointer; }
    .btn-secondary { width: 100%; padding: 14px; border-radius: 14px; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); cursor: pointer; }
    
    .lesson-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
    .lesson-header { padding: 18px 22px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .lesson-content { max-height: 0; overflow: hidden; transition: max-height 0.4s; background: rgba(0,0,0,0.1); }
    .lesson-item.active .lesson-content { max-height: 1000px; }
    .lesson-body { padding: 20px 22px; font-size: 0.9rem; }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn { width: 100%; text-align: left; padding: 16px; border: 2px solid var(--border); border-radius: 16px; background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; transition: 0.2s; }
    .opt-btn:hover { border-color: var(--accent); }
    .opt-btn.correct { border-color: var(--success); background: var(--success-bg); }
    .opt-btn.wrong { border-color: var(--error); background: var(--error-bg); }

    .lesson-module-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 24px 20px; cursor: pointer; transition: all 0.3s ease; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .lesson-module-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 30px var(--accent-glow); }
    .lesson-module-card .icon { font-size: 2.4rem; }
    .lesson-module-card h4 { font-size: 0.95rem; font-weight: 600; line-height: 1.4; }
    .section-title { font-size: 1rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 20px 0 10px; }

    @media (max-width: 600px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } .icebreaker-grid { grid-template-columns: repeat(2, 1fr); } .lesson-hero { height: 180px; } #lessonsModulesGrid { grid-template-columns: 1fr 1fr !important; } }
  </style>
</head>
<body>

<div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app">
  <div class="topbar">
    <div class="logo" onclick="showScreen('home')">PsyQuiz</div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="showScreen('home')">🏠</button>
      <button class="icon-btn" onclick="showScreen('lessons')">📚</button>
      <button class="icon-btn" onclick="toggleTheme()">🌓</button>
    </div>
  </div>

  <div class="screen active" id="screen-home">
    <div class="hero"><h1>Психологічні квізи</h1><p>Відкрий таємниці власного розуму.</p></div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="totalPlayed">0</div><div class="stat-label">Ігор</div></div>
      <div class="stat-card"><div class="stat-value" id="avgScore">0%</div><div class="stat-label">Бал</div></div>
      <div class="stat-card"><div class="stat-value" id="totalXP">0</div><div class="stat-label">XP</div></div>
      <div class="stat-card"><div class="stat-value">🎓</div><div class="stat-label">Статус</div></div>
    </div>
    <div class="section-title">Обери тему для квізу</div>
    <div class="quiz-grid" id="quizGrid"></div>
  </div>

  <div class="screen" id="screen-lessons">
    <div class="stats-header"><h2>Бібліотека знань</h2><p style="color:var(--text-secondary)">Оберіть модуль для глибокого вивчення</p></div>
    <div id="lessonsModulesGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px;"></div>
    <button class="btn-secondary" style="margin-top: 30px;" onclick="showScreen('home')">Назад</button>
  </div>

  <div class="screen" id="screen-lesson-detail">
    <div id="lessonDetailContent"></div>
    <button class="btn-secondary" style="margin-top:20px;margin-bottom:40px;" onclick="showScreen('lessons')">До бібліотеки</button>
  </div>

  <div class="screen" id="screen-quiz">
    <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
      <h3 id="playTitle">Квіз</h3>
      <div id="timer" style="font-weight: 800; color: var(--accent);">30с</div>
    </div>
    <div class="question-card">
      <div id="qText" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 20px;"></div>
      <div id="qOptions" class="options"></div>
      <div id="qFeedback" style="margin-top: 20px; padding: 15px; border-radius: 12px; display: none; background: var(--bg-secondary);">
        <h4 id="fbHeader"></h4><p id="fbText" style="font-size: 0.9rem; margin-top: 5px;"></p>
      </div>
      <button id="qNext" class="btn-primary" style="margin-top: 20px; display: none;" onclick="nextQ()">Далі</button>
    </div>
  </div>

  <div class="screen" id="screen-results">
    <div class="results-card">
      <h2 id="scoreText" style="font-size: 3.5rem; color: var(--accent);">0%</h2>
      <p id="resMessage" style="margin: 15px 0;"></p>
      <button class="btn-primary" onclick="showScreen('home')">На головну</button>
    </div>
  </div>
</div>

      { q: "Скільки об'єктів утримує робоча пам'ять?", opts: ["3", "5", "7±2", "12"], ans: 2, info: "Магічне число Міллера каже про 5-9 елементів." },

      { q: "Ефект праймінгу — це?", opts: ["Перше враження", "Попередній стимул впливає на реакцію", "Втрата мотивації", "Лінь"], ans: 1, info: "Попередня інформація готує мозок." },

    { q: "Що таке EQ?", opts: ["Вміння сміятись", "Розуміння і керування емоціями", "Швидкість", "Співчуття"], ans: 1, info: "Емоційний інтелект часто важливіший за IQ." }

let state = { currentQuiz: null, currentQ: 0, score: 0, timerInterval: null, timeLeft: 30 };

function getStorage() { 
  try { return JSON.parse(localStorage.getItem('psyquiz') || '{}'); } 
  catch(e) { return {}; } 
}

function saveStorage(data) { 
  localStorage.setItem('psyquiz', JSON.stringify(data)); 
}

function showScreen(name) {
  clearInterval(state.timerInterval);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + name);
  if (target) target.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'lessons') renderLessons();
  window.scrollTo(0,0);
}

function renderHome() {
  const data = getStorage();
  const results = data.results || [];
  document.getElementById('totalPlayed').textContent = results.length;
  const total = results.reduce((s, r) => s + r.percentage, 0);
  document.getElementById('avgScore').textContent = (results.length ? Math.round(total / results.length) : 0) + '%';
  document.getElementById('totalXP').textContent = data.xp || 0;
  
  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  quizzes.forEach(q => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.onclick = () => startQuiz(q.id);
    card.innerHTML = `<h3>${q.icon} ${q.title}</h3><p style="font-size:0.8rem;color:var(--text-secondary);">Перевір знання</p>`;
    grid.appendChild(card);
  });
}

function renderLessons() {
  const grid = document.getElementById('lessonsModulesGrid');
  grid.innerHTML = '';
  quizzes.forEach(q => {
    const card = document.createElement('div');
    card.className = 'lesson-module-card';
    card.onclick = () => viewLesson(q.id);
    card.innerHTML = `<span class="icon">${q.icon}</span><h4>${q.title}</h4>`;
    grid.appendChild(card);
  });
}

function viewLesson(id) {
  const lesson = lessonMaterials[id];
  const quiz = quizzes.find(q => q.id === id);
  if (!lesson || !quiz) return;
  
  const pool = icebreakerPool[id] || icebreakerPool['emotions'];
  const iceHTML = `
    <div class="icebreaker-section">
      <div class="icebreaker-title">Який я сьогодні? 🐾</div>
      <div class="icebreaker-grid">
        ${pool.slice(0,6).map((a, i) => `
          <div class="animal-card" onclick="selectIce(this, '${a.mood}')">
            <div class="animal-img-wrapper"><img src="${a.img}"></div>
            <span class="animal-number">${i+1}</span>
          </div>
        `).join('')}
      </div>
      <div id="iceFB" class="icebreaker-feedback"></div>
    </div>
  `;
  
  document.getElementById('lessonDetailContent').innerHTML = `
    <div class="lesson-hero">
      <img src="${lesson.hero}">
      <div class="lesson-hero-overlay"><div class="lesson-hero-title">${quiz.title}</div></div>
    </div>
    ${iceHTML}
    <div class="lesson-rich-content">
      <p style="font-size:1.2rem;color:var(--accent-light);font-weight:700;">${lesson.intro}</p>
      ${lesson.content}
    </div>
    <div class="section-title" style="margin-top:40px;">Питання для закріплення</div>
    <div id="lAcc"></div>
    <button class="btn-primary" style="margin-top:30px;" onclick="startQuiz('${id}')">Почати квіз за темою ✍️</button>
  `;
  
  const acc = document.getElementById('lAcc');
  quiz.questions.forEach(q => {
    const item = document.createElement('div');
    item.className = 'lesson-item';
    item.innerHTML = `
      <div class="lesson-header" onclick="this.parentElement.classList.toggle('active')">
        <h4>${q.q}</h4><span>▾</span>
      </div>
      <div class="lesson-content">
        <div class="lesson-body">${q.info}</div>
      </div>
    `;
    acc.appendChild(item);
  });
  showScreen('lesson-detail');
}

function selectIce(el, mood) {
  document.querySelectorAll('.animal-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  const fb = document.getElementById('iceFB');
  fb.style.display = 'block';
  fb.innerHTML = `Чудово! Твій стан сьогодні — <b>${mood}</b>. Почнімо урок!`;
}

function startQuiz(id) {
  const q = quizzes.find(x => x.id === id);
  if (!q || !q.questions.length) { alert('Квіз у розробці!'); return; }
  state = { currentQuiz: q, currentQ: 0, score: 0, timerInterval: null, timeLeft: 30 };
  document.getElementById('playTitle').textContent = q.title;
  showScreen('quiz');
  showQ();
}

function showQ() {
  state.timeLeft = 30;
  const q = state.currentQuiz.questions[state.currentQ];
  document.getElementById('qText').textContent = q.q;
  const opts = document.getElementById('qOptions');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = o;
    b.onclick = () => selAns(i);
    opts.appendChild(b);
  });
  document.getElementById('qFeedback').style.display = 'none';
  document.getElementById('qNext').style.display = 'none';
  document.getElementById('timer').textContent = '30с';
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    document.getElementById('timer').textContent = state.timeLeft + 'с';
    if (state.timeLeft <= 0) selAns(-1);
  }, 1000);
}

function selAns(idx) {
  clearInterval(state.timerInterval);
  const q = state.currentQuiz.questions[state.currentQ];
  const correct = idx === q.ans;
  if (correct) state.score++;
  
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b, i) => {
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx) b.classList.add('wrong');
    b.disabled = true;
  });
  
  document.getElementById('fbHeader').textContent = correct ? '✅ Правильно!' : '❌ Помилка';
  document.getElementById('fbText').textContent = q.info;
  document.getElementById('qFeedback').style.display = 'block';
  document.getElementById('qNext').style.display = 'block';
}

function nextQ() {
  state.currentQ++;
  if (state.currentQ < state.currentQuiz.questions.length) {
    showQ();
  } else {
    finish();
  }
}

function finish() {
  const pct = Math.round((state.score / state.currentQuiz.questions.length) * 100);
  const data = getStorage();
  if (!data.results) data.results = [];
  data.results.unshift({ quizId: state.currentQuiz.id, percentage: pct, date: new Date().toISOString() });
  data.xp = (data.xp || 0) + (state.score * 10);
  saveStorage(data);
  
  document.getElementById('scoreText').textContent = pct + '%';
  document.getElementById('resMessage').textContent = pct >= 80 ? 'Вражаюче! Ти справжній знавець.' : 'Дякуємо за гру! Повертайся ще.';
  showScreen('results');
}

function toggleTheme() {
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  const d = getStorage();
  d.theme = next;
  saveStorage(d);
}

// Init
const d = getStorage();
if (d.theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
renderHome();
</script>
