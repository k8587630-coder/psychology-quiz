services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: psyquiz
      POSTGRES_PASSWORD: psyquiz2026
      POSTGRES_DB: psyquiz
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    ports:
      - "4056:4056"
    environment:
      DATABASE_URL: "postgresql://psyquiz:psyquiz2026@db:5432/psyquiz"
      JWT_SECRET: "psyquiz_super_secret_2026"
      PORT: "4056"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
