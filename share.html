<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsyQuiz — Сертифікат</title>

  <!-- Open Graph — для красивого превʼю у Telegram/Facebook/Twitter -->
  <meta property="og:type"        content="website">
  <meta property="og:site_name"   content="PsyQuiz">
  <meta id="ogTitle"  property="og:title"       content="Сертифікат PsyQuiz">
  <meta id="ogDesc"   property="og:description" content="Психологічний квіз пройдено!">
  <meta property="og:image"       content="/og-preview.png">
  <meta name="twitter:card"       content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg: #07071a; --bg2: #0e0e2a;
      --purple: #7f5af0; --purple-l: #a78bfa;
      --cyan: #06b6d4; --green: #2cb67d;
      --yellow: #fbbf24; --text: #f0f0ff; --text2: #8888b0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
    }

    /* aurora */
    .aurora { position: fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .orb { position:absolute; border-radius:50%; filter:blur(110px); animation:drift 28s ease-in-out infinite; }
    .orb:nth-child(1){ width:600px;height:600px;background:radial-gradient(circle,#7f5af0,transparent 70%);top:-200px;left:-200px;opacity:.3; }
    .orb:nth-child(2){ width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent 70%);bottom:-100px;right:-100px;opacity:.2;animation-delay:-9s; }
    .orb:nth-child(3){ width:400px;height:400px;background:radial-gradient(circle,#ec4899,transparent 70%);top:40%;left:30%;opacity:.12;animation-delay:-18s; }
    @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(70px,-90px) scale(1.06)}66%{transform:translate(-50px,70px) scale(.96)}}

    .wrap { position:relative; z-index:1; width:100%; max-width:680px; padding:32px 20px 60px; }

    /* top nav */
    .topnav { display:flex; justify-content:center; padding:20px 0 32px; }
    .logo { font-size:1.4rem; font-weight:900; letter-spacing:-.04em;
      background:linear-gradient(135deg,var(--purple),var(--cyan));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    /* certificate card */
    .cert-card {
      background: linear-gradient(135deg, rgba(127,90,240,.12), rgba(6,182,212,.06));
      border: 1px solid rgba(127,90,240,.35);
      border-radius: 28px; padding: 48px 40px 40px;
      text-align: center; position: relative;
      box-shadow: 0 0 80px rgba(127,90,240,.15), 0 24px 64px rgba(0,0,0,.4);
    }

    /* corner stars */
    .cert-card::before, .cert-card::after {
      content: '✦'; position:absolute; font-size:1.2rem; color:rgba(127,90,240,.4);
    }
    .cert-card::before { top:20px; left:24px; }
    .cert-card::after  { bottom:20px; right:24px; }

    .cert-badge {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 18px; border-radius:100px; margin-bottom:28px;
      background:linear-gradient(135deg,#7f5af0,#5b21b6);
      font-size:.8rem; font-weight:800; color:#fff; letter-spacing:.05em;
    }

    .cert-label {
      font-size:.85rem; color:var(--text2); margin-bottom:6px;
      letter-spacing:.06em; text-transform:uppercase;
    }

    .cert-name {
      font-size:clamp(1.8rem,6vw,2.8rem); font-weight:900;
      letter-spacing:-.04em; line-height:1.1; margin-bottom:6px;
      background:linear-gradient(135deg,#e2d9fa,#f0f0ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    .cert-divider {
      display:flex; align-items:center; gap:12px; margin:20px 0;
    }
    .cert-divider hr { flex:1; border:none; border-top:1px solid rgba(127,90,240,.25); }
    .cert-divider span { color:var(--purple-l); font-size:.9rem; }

    .cert-passed { font-size:1rem; color:var(--text2); margin-bottom:12px; }

    .cert-quiz {
      display:inline-block; padding:10px 24px; border-radius:14px;
      background:rgba(127,90,240,.12); border:1px solid rgba(127,90,240,.3);
      font-size:1.15rem; font-weight:800; color:var(--purple-l);
      margin-bottom:32px; max-width:100%;
    }

    /* score seal */
    .seal-wrap { display:flex; justify-content:center; margin-bottom:32px; }
    .seal {
      width:120px; height:120px; border-radius:50%; position:relative;
      background:linear-gradient(135deg,#4c1d95,#1e1b4b);
      border:2px solid rgba(127,90,240,.7);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 0 40px rgba(127,90,240,.4), inset 0 0 20px rgba(0,0,0,.3);
    }
    .seal::before {
      content:''; position:absolute; inset:-10px; border-radius:50%;
      border:1.5px dashed rgba(127,90,240,.35);
    }
    .seal-pct {
      font-size:2.4rem; font-weight:900; letter-spacing:-.05em; line-height:1;
    }
    .seal-label {
      font-size:.65rem; font-weight:700; letter-spacing:.1em;
      color:rgba(255,255,255,.5); margin-top:2px;
    }
    .seal-stars { font-size:.7rem; margin-bottom:2px; }

    .cert-date { font-size:.82rem; color:var(--text2); margin-top:4px; }

    /* share section */
    .share-section { margin-top:36px; }
    .share-title { font-size:.85rem; color:var(--text2); text-align:center;
      margin-bottom:14px; letter-spacing:.04em; text-transform:uppercase; }
    .share-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .share-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:13px 16px; border-radius:14px; font-weight:800; font-size:.9rem;
      text-decoration:none; transition:opacity .2s, transform .2s; cursor:pointer;
    }
    .share-btn:hover { opacity:.85; transform:translateY(-2px); }
    .btn-tg  { background:rgba(0,136,204,.18); border:1px solid rgba(0,136,204,.35); color:#38bdf8; }
    .btn-tw  { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); color:#f0f0ff; }
    .btn-fb  { background:rgba(24,119,242,.18); border:1px solid rgba(24,119,242,.35); color:#60a5fa; }
    .btn-vb  { background:rgba(127,90,240,.18); border:1px solid rgba(127,90,240,.35); color:#a78bfa; }

    .copy-row { display:flex; gap:8px; }
    .copy-input {
      flex:1; padding:10px 14px; border-radius:12px; font-size:.82rem;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      color:var(--text); outline:none;
    }
    .copy-btn {
      padding:10px 18px; border-radius:12px; border:none; cursor:pointer;
      background:rgba(127,90,240,.3); color:var(--purple-l);
      font-weight:700; font-size:.82rem; white-space:nowrap; transition:background .2s;
    }
    .copy-btn:hover { background:rgba(127,90,240,.5); }

    /* CTA */
    .cta-box {
      margin-top:28px; padding:24px; border-radius:20px; text-align:center;
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07);
    }
    .cta-box p { color:var(--text2); font-size:.9rem; margin-bottom:14px; }
    .cta-btn {
      display:inline-block; padding:13px 32px; border-radius:14px;
      background:linear-gradient(135deg,var(--purple),#5b21b6); color:#fff;
      font-weight:800; font-size:.95rem; text-decoration:none;
      box-shadow:0 4px 20px rgba(127,90,240,.4); transition:opacity .2s;
    }
    .cta-btn:hover { opacity:.85; }

    /* loading / error */
    .center-msg {
      text-align:center; padding:80px 20px; color:var(--text2); font-size:1.1rem;
    }

    @media(max-width:480px){
      .cert-card { padding:36px 24px 32px; }
      .share-btns { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="aurora"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="wrap">
  <div class="topnav">
    <a href="/" class="logo">PsyQuiz</a>
  </div>
  <div id="content"><div class="center-msg">Завантаження...</div></div>
</div>

<script>
(function() {
  const params = new URLSearchParams(location.search);
  const content = document.getElementById('content');

  const name      = params.get('n');
  const quizName  = params.get('q');
  const pct       = parseInt(params.get('p'));
  const dateStr   = params.get('d');

  if (!name || !quizName || isNaN(pct)) {
    content.innerHTML = '<div class="center-msg">❌ Посилання недійсне</div>';
    return;
  }

  const cert = { name, quizName, pct, date: dateStr };

  const scoreColor = pct >= 90 ? '#fbbf24' : pct >= 70 ? '#a78bfa' : '#06b6d4';
  const resultLabel = pct >= 90 ? 'ВІДМІННО' : pct >= 70 ? 'ЧУДОВО' : 'ЗАРАХОВАНО';
  const starsHtml = pct >= 90 ? '★★★' : pct >= 70 ? '★★☆' : '★☆☆';
  const certDate = dateStr
    ? new Date(dateStr).toLocaleDateString('uk-UA', { year:'numeric', month:'long', day:'numeric' })
    : new Date().toLocaleDateString('uk-UA', { year:'numeric', month:'long', day:'numeric' });

  // Update OG meta
  document.getElementById('ogTitle').content = `${name} — ${pct}% з «${quizName}» | PsyQuiz`;
  document.getElementById('ogDesc').content  = `Перевір свої знання з психології на PsyQuiz!`;
  document.title = `${name} — Сертифікат PsyQuiz`;

  const shareUrl = location.href;
  const shareText = encodeURIComponent(`Я набрав(ла) ${pct}% у квізі «${quizName}» на PsyQuiz! 🧠`);
  const shareUrlEnc = encodeURIComponent(shareUrl);

  content.innerHTML = `
    <div class="cert-card">
      <div class="cert-badge">🎓 СЕРТИФІКАТ</div>

      <div class="cert-label">Цей сертифікат підтверджує, що</div>
      <div class="cert-name">${name}</div>

      <div class="cert-divider">
        <hr><span>✦</span><hr>
      </div>

      <div class="cert-passed">успішно пройшов(ла) квіз</div>
      <div class="cert-quiz">«${quizName}»</div>

      <div class="seal-wrap">
        <div class="seal">
          <div class="seal-stars" style="color:${scoreColor}">${starsHtml}</div>
          <div class="seal-pct" style="color:${scoreColor}">${pct}%</div>
          <div class="seal-label">${resultLabel}</div>
        </div>
      </div>

      <div class="cert-date">📅 ${certDate}</div>
    </div>

    <div class="share-section">
      <div class="share-title">Поділитись результатом</div>
      <div class="share-btns">
        <a class="share-btn btn-tg"
           href="https://t.me/share/url?url=${shareUrlEnc}&text=${shareText}" target="_blank">
          ✈️ Telegram
        </a>
        <a class="share-btn btn-tw"
           href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrlEnc}" target="_blank">
          𝕏 Twitter
        </a>
        <a class="share-btn btn-fb"
           href="https://www.facebook.com/sharer/sharer.php?u=${shareUrlEnc}" target="_blank">
          👤 Facebook
        </a>
        <a class="share-btn btn-vb"
           href="viber://forward?text=${shareText}%20${shareUrlEnc}" target="_blank">
          💬 Viber
        </a>
      </div>
      <div class="copy-row">
        <input class="copy-input" id="copyInput" readonly value="${shareUrl}">
        <button class="copy-btn" onclick="copyLink()">Копіювати</button>
      </div>
    </div>

    <div class="cta-box">
      <p>Хочеш перевірити свої знання з психології? 🧠</p>
      <a href="/app" class="cta-btn">Спробувати квіз безкоштовно →</a>
    </div>
  `;

  function copyLink() {
    navigator.clipboard.writeText(shareUrl).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ Скопійовано!';
      btn.style.background = 'rgba(44,182,125,.3)';
      btn.style.color = '#2cb67d';
      setTimeout(() => {
        btn.textContent = 'Копіювати';
        btn.style.background = 'rgba(127,90,240,.3)';
        btn.style.color = '#a78bfa';
      }, 2500);
    });
  }
  window.copyLink = copyLink;
})();
</script>

</body>
</html>
